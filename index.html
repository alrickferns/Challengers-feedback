<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengers CC | Player Feedback</title>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark-green: #062c1a;
            --black: #0a0a0a;
            --card-bg: #151515;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--gold-glow); } 50% { box-shadow: 0 0 20px var(--gold-glow); } 100% { box-shadow: 0 0 5px var(--gold-glow); } }

        body {
            background-color: var(--black);
            background-image: radial-gradient(circle at center, #1a2a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
            position: relative;
        }

        .header { text-align: center; margin-bottom: 30px; }
        
        .logo { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 3px solid var(--gold);
            animation: glow 3s infinite ease-in-out;
            transition: transform 0.5s;
        }
        .logo:hover { transform: rotate(5deg) scale(1.1); }

        h2 { 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 1.6rem; 
            margin: 15px 0 0 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .question { margin-bottom: 30px; animation: fadeIn 1s ease-out; }

        label { 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 600; 
            color: #efefef; 
            font-size: 0.95rem;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
        }

        /* CUSTOM SLIDER STYLING */
        .slider-container { width: 100%; position: relative; padding-bottom: 25px; }
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #333;
            outline: none;
            cursor: pointer;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            box-shadow: 0 0 10px var(--gold);
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--gold); outline: none; background: #2a2a2a; }

        .btn-submit {
            background: linear-gradient(45deg, var(--gold), #8a6d1a);
            color: #000;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-submit:hover { 
            letter-spacing: 4px; 
            background: linear-gradient(45deg, #fff, var(--gold));
            transform: translateY(-3px);
        }

        #success-msg { display: none; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <div class="header">
        <img src="Logo.jpg" alt="Challengers CC" class="logo">
        <h2>Challengers CC</h2>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSen413ZIfb79D1BSdH9xR4FfVtOSeLaq9fjjK9_JHoZ_RQJpA/formResponse" 
          method="POST" 
          target="hidden_iframe" 
          onsubmit="submitted=true;">
        
        <div class="question">
            <label>Current timing and venue thoughts?</label>
            <div class="slider-container">
                <input type="range" min="1" max="10" value="5" class="slider" name="entry.1982838308" id="timingSlider">
                <div class="slider-labels">
                    <span>Need Change</span>
                    <span>No Change</span>
                </div>
            </div>
        </div>

        <div class="question">
            <label>Are matches competitive and well-organized?</label>
            <select name="entry.1855563416" required>
                <option value="" disabled selected>Select quality level</option>
                <option value="Yes">Yes, Elite Level</option>
                <option value="Mostly">Mostly Good</option>
                <option value="Needs Improvement">Needs Improvement</option>
            </select>
        </div>

        <div class="question">
            <label>Tournament Frequency Preference:</label>
            <select name="entry.85194000" required>
                <option value="More frequently">More frequently</option>
                <option value="Less frequently">Less frequently</option>
                <option value="The current rhythm is fine">The current rhythm is fine</option>
            </select>
        </div>

        <div class="question">
            <label>The #1 way to improve Challengers CC?</label>
            <textarea name="entry.807952429" rows="3" placeholder="Drop your suggestions here..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Feedback</button>
    </form>
</div>

<div class="container" id="success-msg">
    <img src="Logo.jpg" alt="Challengers CC" class="logo" style="width: 80px; height: 80px;">
    <h2>Cheers!</h2>
    <p style="color: var(--gold); font-weight: bold;">Feedback Received.</p>
    <p>We'll see you on the pitch this Saturday!</p>
    <button class="btn-submit" onclick="location.reload()" style="margin-top: 20px;">Send Another</button>
</div>

<script>
    var submitted = false;
    function showSuccess() {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    }
</script>

</body>
</html>
