<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Challengers Cricket Club | Player Feedback</title>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --dark-green: #062c1a;
            --black: #0a0a0a;
            --card-bg: #151515;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--gold-glow); } 50% { box-shadow: 0 0 20px var(--gold-glow); } 100% { box-shadow: 0 0 5px var(--gold-glow); } }
        @keyframes stadiumLights {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background-color: var(--black);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(6, 44, 26, 0.15), transparent 40%);
            background-size: 200% 200%;
            animation: stadiumLights 15s ease-in-out infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background: rgba(21, 21, 21, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 35px 25px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 25px; animation: fadeInDown 0.8s ease-out; }
        
        .logo { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 3px solid var(--gold);
            animation: glow 3s infinite ease-in-out;
            transition: transform 0.5s;
            object-fit: cover;
        }
        .logo:hover { transform: scale(1.08); }

        h2 { 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 1.3rem;
            margin: 15px 0 0 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.3;
        }

        .question { opacity: 0; animation: slideUpFade 0.6s ease-out forwards; margin-bottom: 25px; }
        .question:nth-child(1) { animation-delay: 0.2s; }
        .question:nth-child(2) { animation-delay: 0.4s; }
        .question:nth-child(3) { animation-delay: 0.6s; }
        .question:nth-child(4) { animation-delay: 0.8s; }

        label { 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 600; 
            color: #efefef; 
            font-size: 0.95rem;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
        }

        /* CUSTOM SLIDER STYLING */
        .slider-container { width: 100%; position: relative; padding-bottom: 20px; }
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #333;
            outline: none;
            cursor: pointer;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            box-shadow: 0 0 12px var(--gold);
            transition: transform 0.2s;
        }
        .slider::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus { 
            border-color: var(--gold); 
            outline: none; 
            background: #2a2a2a; 
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--gold), #8a6d1a);
            color: #000;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            opacity: 0;
            animation: slideUpFade 0.6s ease-out forwards;
            animation-delay: 1s;
        }

        .btn-submit:hover, .btn-submit:active { 
            letter-spacing: 3px; 
            background: linear-gradient(45deg, #fff, var(--gold));
            transform: translateY(-2px);
        }

        #success-msg { display: none; text-align: center; padding: 30px 0; }
        
        @media (max-width: 400px) {
            h2 { font-size: 1.15rem; }
            .logo { width: 90px; height: 90px; }
            .container { padding: 25px 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <div class="header">
        <img src="Logo.jpg" alt="Challengers Cricket Club" class="logo">
        <h2>Challengers Cricket Club</h2>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSen413ZIfb79D1BSdH9xR4FfVtOSeLaq9fjjK9_JHoZ_RQJpA/formResponse" 
          method="POST" 
          target="hidden_iframe" 
          onsubmit="submitted=true;">
        
        <div class="question">
            <label>Current timing and venue thoughts?</label>
            <div class="slider-container">
                <input type="range" min="1" max="10" value="5" class="slider" name="entry.1982838308" id="timingSlider">
                <div class="slider-labels">
                    <span>Need Change</span>
                    <span>No Change</span>
                </div>
            </div>
        </div>

        <div class="question">
            <label>Are matches competitive and well-organized?</label>
            <div class="slider-container">
                <input type="range" min="1" max="10" value="5" class="slider" name="entry.1855563416" id="competitiveSlider">
                <div class="slider-labels">
                    <span>No</span>
                    <span>Yes</span>
                </div>
            </div>
        </div>

        <div class="question">
            <label>Tournament Frequency Preference:</label>
            <select name="entry.85194000" required>
                <option value="More frequently">More frequently</option>
                <option value="Less frequently">Less frequently</option>
                <option value="The current rhythm is fine">The current rhythm is fine</option>
            </select>
        </div>

        <div class="question">
            <label>The #1 way to improve Challengers Cricket Club?</label>
            <textarea name="entry.807952429" rows="3" placeholder="Drop your suggestions here..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Feedback</button>
    </form>
</div>

<div class="container" id="success-msg">
    <img src="Logo.jpg" alt="Challengers Cricket Club" class="logo" style="width: 80px; height: 80px;">
    <h2>Cheers!</h2>
    <p style="color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-top: 15px;">Feedback Received.</p>
    <p style="color: #ccc; line-height: 1.5;">We'll review your input and see you on the pitch!</p>
    <button class="btn-submit" onclick="location.reload()" style="animation-delay: 0s; margin-top: 25px; font-size: 0.9rem;">Send Another</button>
</div>

<script>
    var submitted = false;
    function showSuccess() {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    }
</script>

</body>
</html>
