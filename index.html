<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challengers CC | Player Feedback</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-green: #062c1a;
            --black: #121212;
            --white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin-top: 20px;
        }

        .header { text-align: center; margin-bottom: 35px; }
        
        .logo { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 3px solid var(--gold);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin: 10px 0; font-size: 1.4rem; }
        p.subtitle { font-size: 0.85rem; color: #888; margin-top: -5px; }

        .question { margin-bottom: 25px; }

        label { display: block; margin-bottom: 10px; font-weight: 600; color: #e0e0e0; font-size: 0.95rem; }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--gold), #b8860b);
            color: var(--black);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        #success-msg { display: none; text-align: center; color: var(--gold); padding: 40px 20px; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <div class="header">
        <img src="Logo.jpg" alt="Challengers CC" class="logo">
        <h2>Challengers CC</h2>
        <p class="subtitle">Saturday Night Feedback (10 PM - 1 AM)</p>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSen413ZIfb79D1BSdH9xR4FfVtOSeLaq9fjjK9_JHoZ_RQJpA/formResponse" 
          method="POST" 
          target="hidden_iframe" 
          onsubmit="submitted=true;">
        
        <div class="question">
            <label>Current timing (10pm-1am) and venue thoughts?</label>
            <input type="text" name="entry.1982838308" required placeholder="Too late? Just right?">
        </div>

        <div class="question">
            <label>Are matches competitive and well-organized?</label>
            <select name="entry.1855563416" required>
                <option value="" disabled selected>Choose an option</option>
                <option value="Yes">Yes, absolutely</option>
                <option value="Mostly">Mostly</option>
                <option value="Needs Improvement">Needs Improvement</option>
            </select>
        </div>

        <div class="question">
            <label>Tournament Frequency Preference:</label>
            <select name="entry.85194000" required>
                <option value="More frequently">More frequently</option>
                <option value="Less frequently">Less frequently</option>
                <option value="The current rhythm is fine">The current rhythm is fine</option>
            </select>
        </div>

        <div class="question">
            <label>#1 thing to make the Club better?</label>
            <textarea name="entry.807952429" rows="3" placeholder="Share your top suggestion..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit to Committee</button>
    </form>
</div>

<div class="container" id="success-msg">
    <img src="Logo.jpg" alt="Challengers CC" class="logo" style="width: 100px; height: 100px;">
    <h2>Thank You!</h2>
    <p style="color: #ccc;">Your feedback has been recorded. See you on the pitch!</p>
    <button class="btn-submit" onclick="location.reload()" style="background: none; color: var(--gold); border: 1px solid var(--gold); margin-top: 20px;">Send another response</button>
</div>

<script>
    var submitted = false;
    function showSuccess() {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    }
</script>

</body>
</html>
